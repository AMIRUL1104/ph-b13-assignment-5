<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page | GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/Aperture.png"
      type="image/x-icon"
    />

    <!-- font awesome icon  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui  and tailwindcss -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- import geist google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />

    <!-- custom  css file  -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-[#F8FAFC] min-h-[100vh]">
    <header
      class="navbar bg-white shadow-sm flex justify-between mb-4 sm:mb-10"
    >
      <div class="flex items-center gap-2">
        <div class="w-6 sm:w-9 inline-block">
          <img src="./assets/github-logo.png" alt="" srcset="" />
        </div>
        <span class="text-lg sm:text-2xl font-semibold"
          >GitHub Issues Tracker</span
        >
      </div>

      <div class="flex gap-2 items-center relative">
        <span class="absolute left-2 z-30 text-base"
          ><i class="fa-solid fa-magnifying-glass text-[#64748B]"></i
        ></span>
        <input
          type="text"
          id="search"
          placeholder="Search issues..."
          class="input input-bordered w-60 max-md:w-40 pl-7"
        />
        <button class="btn btn-primary px-1">
          <span class="text-xl">+</span> New issue
        </button>
      </div>
    </header>

    <!-- name of each tab group should be unique -->
    <section
      class="tabs tabs-box shadow-sm bg-white flex gap-4 mb-5 p-4 max-w-7xl mx-auto sticky top-0 z-20"
    >
      <button
        type="button"
        id="all"
        name="my_tabs_6"
        onclick="handleTab('all')"
        class="btn font-medium color-secndery bg-color-active status-tab w-24"
      >
        All
      </button>
      <button
        type="button"
        id="open"
        name="my_tabs_6"
        onclick="handleTab('open')"
        class="btn font-medium color-secndery status-tab w-24"
      >
        Open
      </button>
      <button
        type="button"
        id="closed"
        name="my_tabs_6"
        onclick="handleTab('closed')"
        class="btn font-medium color-secndery status-tab w-24"
      >
        Closed
      </button>
    </section>

    <!-- main box -->
    <section
      id="main-issue-box"
      class="flex flex-col gap-3 max-w-7xl mx-auto pb-5 px-5 shadow-sm relative"
    >
      <!-- issues counter -->
      <div
        id="count-box"
        class="rounded-t-sm shadow-sm rounded-tr-sm p-2 bg-white flex items-center justify-between absolute w-full top-0 left-0"
      ></div>

      <!-- issue cards -->
      <div id="isseus-conteiner" class="grid grid-cols-4 gap-3 mt-24"></div>
    </section>

    <!-- spinner  -->

    <div id="spinner" class="mx-auto flex items-center justify-center">
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_1" class="modal"></dialog>

    <!-- javascript files -->
    <script src="./script/home.js"></script>
  </body>
</html>
